<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>N-Back Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0d11">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0c0d11;
            --card-grad-top: #212228;
            --card-grad-bot: #16171b;
            --card-border: #2e2f37;
            --key-grad-top: #2c2d34;
            --key-grad-bot: #212229;
            --key-border: #353640;
            --text-main: #ffffff;
            --text-muted: #82838c;
            --text-dim: #6c6d76;
            --accent-color: #0a84ff;
            --accent-bright: #3d8bff;
            --accent-icon: #5fa0ff;
            --success-color: #30d158;
            --error-color: #ff453a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed;
            color: var(--text-main); font-family: 'Nunito', -apple-system, sans-serif;
            background: radial-gradient(120% 70% at 50% -8%, #16171c 0%, #0c0d11 45%, #08090c 100%);
        }
        #app-viewport {
            display: flex; flex-direction: column; width: 100%; height: 100%;
            padding-top: max(10px, env(safe-area-inset-top));
            padding-left: 18px; padding-right: 18px; padding-bottom: env(safe-area-inset-bottom);
            transition: height 0.1s;
        }

        /* --- МЕНЮ --- */
        #setup-screen {
            flex: 1; width: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 12px 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        #setup-screen::-webkit-scrollbar { display: none; }
        .menu-content { width: 100%; max-width: 410px; margin: 0 auto; flex-shrink: 0; }

        h1 {
            margin: 6px 0 18px 0; color: #fff; font-size: 2.5rem; font-weight: 900;
            text-align: center; letter-spacing: -1.4px;
            text-shadow: 0 1px 0 #3a3b42, 0 2px 1px rgba(0,0,0,.5), 0 6px 30px rgba(10,132,255,.3);
        }

        .settings-block {
            padding: 16px 14px; margin-bottom: 14px; border-radius: 22px;
            background: linear-gradient(180deg, var(--card-grad-top) 0%, var(--card-grad-bot) 100%);
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.07), inset 0 -1px 0 rgba(0,0,0,.4),
                0 2px 4px rgba(0,0,0,.4), 0 22px 42px -22px rgba(0,0,0,.95);
        }
        .block-title {
            text-align: center; font-weight: 800; font-size: .9rem; letter-spacing: 1.6px;
            color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; text-shadow: 0 1px 0 rgba(0,0,0,.5);
        }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mode-grid.math3 { grid-template-columns: 1fr 1fr 1fr; }
        .mode-grid.math1 { grid-template-columns: 1fr; margin-top: 8px; }

        .mode-btn {
            display: flex; align-items: center; justify-content: center; gap: 7px;
            padding: 13px 5px; border-radius: 14px; font-weight: 700; font-size: .82rem; color: #abacb4;
            cursor: pointer; text-align: center; border: 1px solid var(--key-border);
            font-family: 'Nunito', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            background: linear-gradient(180deg, var(--key-grad-top) 0%, var(--key-grad-bot) 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 3px rgba(0,0,0,.4), 0 6px 12px -7px rgba(0,0,0,.65);
            transition: transform .12s, box-shadow .12s, background .15s, color .15s, border-color .15s;
        }
        .mode-btn svg { width: 16px; height: 16px; flex: 0 0 auto; color: #7e7f88; transition: color .15s; }
        .mode-btn:active { transform: translateY(2px); box-shadow: inset 0 2px 6px rgba(0,0,0,.6); }
        .mode-btn.active {
            color: #fff; border-color: var(--accent-bright);
            background: linear-gradient(180deg, #34353d 0%, #262730 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 0 0 1px rgba(61,139,255,.4),
                0 8px 20px -6px rgba(61,139,255,.6), 0 2px 4px rgba(0,0,0,.45);
        }
        .mode-btn.active svg { color: var(--accent-icon); }
        .super-btn { grid-column: 1 / -1; }

        /* --- КОЛЁСА ПАРАМЕТРОВ (iOS-стиль) --- */
        .params { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 2px; }
        .param { display: flex; flex-direction: column; align-items: center; }
        .param > label { font-size: .73rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: .3px; }
        .picker {
            position: relative; width: 100%; height: 120px; border-radius: 16px; overflow: hidden;
            background: linear-gradient(180deg, #141519 0%, #1b1c21 100%); border: 1px solid #2a2b32;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.75), inset 0 -2px 6px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.04);
            perspective: 700px;
        }
        .picker .sel {
            position: absolute; left: 7px; right: 7px; top: 45px; height: 30px; z-index: 2; pointer-events: none;
            border-top: 1px solid rgba(95,160,255,.45); border-bottom: 1px solid rgba(95,160,255,.45);
            background: linear-gradient(180deg, rgba(61,139,255,.12), rgba(61,139,255,.05));
            border-radius: 7px; box-shadow: 0 0 14px -2px rgba(61,139,255,.35) inset;
        }
        .wlist {
            height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; padding: 45px 0;
            scrollbar-width: none; -webkit-overflow-scrolling: touch; transform-style: preserve-3d;
            -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 32%, #000 68%, transparent 100%);
                    mask-image: linear-gradient(180deg, transparent 0%, #000 32%, #000 68%, transparent 100%);
        }
        .wlist::-webkit-scrollbar { display: none; }
        .witem {
            height: 30px; line-height: 30px; text-align: center; scroll-snap-align: center;
            font-weight: 800; font-size: 1.2rem; color: #fff; font-variant-numeric: tabular-nums;
            transform-origin: center center; backface-visibility: hidden; will-change: transform, opacity;
        }

        /* --- ГЛАВНАЯ КНОПКА (НАЧАТЬ / общая) --- */
        button.main-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border: none; border-radius: 18px; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.25rem; color: #fff; letter-spacing: .5px;
            margin-top: 18px;
            background: linear-gradient(180deg, #38a0ff 0%, #0a84ff 55%, #0670e0 100%); border-bottom: 2px solid #0559b5;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 6px 12px -2px rgba(10,132,255,.55), 0 16px 30px -12px rgba(10,132,255,.6);
            transition: transform .1s, box-shadow .1s;
        }
        button.main-btn svg { width: 17px; height: 17px; }
        button.main-btn:active { transform: translateY(2px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 3px 8px -2px rgba(10,132,255,.5), 0 8px 18px -10px rgba(10,132,255,.6); }

        /* --- ИГРА --- */
        #game-screen { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; }

        .header { display: grid; grid-template-columns: 46px 1fr 46px; align-items: center; flex: 0 0 auto; margin: 10px 0; }
        .control-btn {
            width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--key-border); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: var(--text-muted);
            font-family: 'Nunito', sans-serif; font-weight: 800;
            background: linear-gradient(180deg, var(--key-grad-top), var(--key-grad-bot));
            box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 4px rgba(0,0,0,.4), 0 6px 12px -7px rgba(0,0,0,.6);
            transition: transform .1s, box-shadow .1s;
        }
        .control-btn:active { transform: translateY(1px); box-shadow: inset 0 2px 6px rgba(0,0,0,.6); }
        .info-center { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.3; }
        #timer, .stats-line { font-size: .95rem; font-weight: 800; color: var(--text-muted); font-variant-numeric: tabular-nums; }
        #timer { margin-bottom: 2px; }

        .game-area { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; min-height: 0; }

        /* ОБЪЁМНАЯ КАРТОЧКА СТИМУЛА */
        #word-card {
            width: 100%; max-width: 410px; height: 60%; max-height: 230px; min-height: 165px;
            border-radius: 26px; position: relative; margin-bottom: 22px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #24252c 0%, #15161a 100%); border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.5),
                0 3px 6px rgba(0,0,0,.45), 0 30px 55px -24px rgba(0,0,0,.95);
        }
        #word-index {
            position: absolute; top: 16px; width: 100%; text-align: center;
            font-size: 1rem; font-weight: 800; color: var(--text-muted); opacity: .5; line-height: 1;
        }
        #card-timer {
            position: absolute; bottom: 12px; width: 100%; text-align: center;
            color: var(--text-muted); opacity: .55; font-size: 1rem; font-weight: 800;
            font-variant-numeric: tabular-nums; line-height: 1;
        }
        #word-display {
            font-size: 2.5rem; font-weight: 900; color: #fff; text-transform: uppercase; margin: 0;
            text-align: center; word-break: break-word; hyphens: auto; line-height: 1.05; padding: 0 12px;
            text-shadow: 0 2px 8px rgba(0,0,0,.5);
        }
        .countdown-big { font-size: 5rem !important; color: var(--accent-icon) !important; opacity: .85; text-shadow: 0 4px 24px rgba(61,139,255,.5) !important; }
        #wait-msg { color: var(--text-dim); font-size: 1.2rem; font-weight: 700; }

        /* --- ВВОД (утопленное поле) --- */
        .input-wrapper { flex: 0 0 auto; width: 100%; max-width: 410px; margin: 0 auto; padding-bottom: 0; }
        #app-viewport.kb-open { padding-bottom: 0; }
        #attempts-bar { display: none; }
        #game-form { width: 100%; display: flex; gap: 8px; }
        #native-input {
            flex: 1; padding: 15px; font-size: 1.5rem; color: #fff; text-align: center;
            border-radius: 16px; border: 1px solid #2a2b32; outline: none; -webkit-appearance: none;
            font-family: 'Nunito', sans-serif; font-weight: 800;
            background: linear-gradient(180deg, #141519 0%, #1b1c21 100%);
            box-shadow: inset 0 3px 9px rgba(0,0,0,.75), inset 0 -1px 0 rgba(255,255,255,.04);
            transition: border-color .15s, box-shadow .15s;
        }
        #native-input:focus {
            border-color: var(--accent-bright);
            box-shadow: inset 0 3px 9px rgba(0,0,0,.7), 0 0 0 1px rgba(61,139,255,.4), 0 6px 18px -6px rgba(61,139,255,.5);
        }
        #submit-btn {
            width: 60px; flex-shrink: 0; border: none; border-radius: 16px; cursor: pointer; color: #fff;
            font-size: 1.4rem; display: none; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #38a0ff 0%, #0a84ff 55%, #0670e0 100%); border-bottom: 2px solid #0559b5;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 6px 12px -2px rgba(10,132,255,.5);
            transition: transform .1s;
        }
        #submit-btn:active { transform: translateY(2px); }

        .input-error { border-color: var(--error-color) !important; animation: shake 0.4s;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.7), 0 0 0 1px rgba(255,69,58,.5) !important; }
        .input-success { border-color: var(--success-color) !important; color: var(--success-color) !important;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.5), 0 0 0 1px rgba(48,209,88,.55), 0 6px 18px -6px rgba(48,209,88,.5) !important; }
        .input-reveal { border-color: #fff !important; color: #fff !important;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.5) !important; }

        .hidden { display: none !important; }

        /* --- ОВЕРЛЕИ --- */
        #pause-overlay, #result-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
            background: rgba(8,9,12,.82); backdrop-filter: blur(8px);
        }
        #result-screen { background: var(--bg-color); z-index: 60; }
        .overlay-title { color: #fff; margin: 0 0 26px; font-size: 2rem; font-weight: 900; letter-spacing: -.5px; }
        .overlay-btn { width: 72%; max-width: 300px; }
        .overlay-btn.secondary {
            background: linear-gradient(180deg, #2c2d34, #212229) !important; border-bottom: 2px solid #16171b !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 6px 12px -7px rgba(0,0,0,.6) !important; margin-top: 12px;
        }
        .result-content { margin: auto; width: 100%; max-width: 410px; }
        .result-block { text-align: center; }
        .result-emoji {
            width: 64px; height: 64px; margin: 4px auto 14px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: #fff;
            background: linear-gradient(180deg, #2fce6e, #1fa857); border-bottom: 2px solid #178044;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 10px 24px -8px rgba(48,209,88,.6);
        }
        .result-title { color: var(--success-color); font-size: 2rem; margin: 0 0 18px; text-shadow: 0 2px 16px rgba(48,209,88,.35); }
        .result-stats { display: flex; flex-direction: column; gap: 10px; }
        .rstat { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px;
            border-radius: 14px; background: linear-gradient(180deg, #2c2d34, #212229); border: 1px solid var(--key-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.06); }
        .rstat span { color: var(--text-muted); font-weight: 700; font-size: 1rem; }
        .rstat b { color: #fff; font-weight: 900; font-size: 1.15rem; font-variant-numeric: tabular-nums; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    </style>
</head>
<body>

    <label id="haptic-label" for="haptic-cb" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;"></label>
    <input type="checkbox" switch id="haptic-cb" tabindex="-1" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;">

    <div id="app-viewport">

        <div id="setup-screen">
            <div class="menu-content">
                <h1>N-Back</h1>

                <div class="settings-block">
                    <div class="block-title">ЯЗЫК</div>
                    <div class="mode-grid">
                        <button class="mode-btn active" onclick="setMode('noun', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Существительные</button>
                        <button class="mode-btn" onclick="setMode('verb', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Глаголы</button>
                        <button class="mode-btn" onclick="setMode('adj', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 2.4 7.4H22l-6 4.6 2.3 7.4-6.3-4.6L5.7 21l2.3-7.4-6-4.6h7.6z"/></svg>Прилагательные</button>
                        <button class="mode-btn" onclick="setMode('mix', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>Микс</button>
                    </div>
                </div>

                <div class="settings-block">
                    <div class="block-title">МАТЕМАТИКА</div>
                    <div class="mode-grid math3">
                        <button class="mode-btn math-btn" onclick="setMode('math_table', this)">Таблица умн.</button>
                        <button class="mode-btn math-btn" onclick="setMode('math100', this)">1-100</button>
                        <button class="mode-btn math-btn" onclick="setMode('math500', this)">100-500</button>
                    </div>
                    <div class="mode-grid math1">
                        <button class="mode-btn super-btn" onclick="setMode('super_mix', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>ЯЗЫК + МАТЕМАТИКА</button>
                    </div>
                </div>

                <div class="params">
                    <div class="param">
                        <label>Уровень N</label>
                        <div class="picker" data-key="n" data-min="1" data-max="15" data-def="1"><div class="sel"></div><div class="wlist"></div></div>
                    </div>
                    <div class="param">
                        <label>Ответов</label>
                        <div class="picker" data-key="r" data-min="2" data-max="55" data-def="2"><div class="sel"></div><div class="wlist"></div></div>
                    </div>
                    <div class="param">
                        <label>Время (сек)</label>
                        <div class="picker" data-key="t" data-min="1" data-max="300" data-def="1"><div class="sel"></div><div class="wlist"></div></div>
                    </div>
                </div>

                <button class="main-btn" onclick="startGame()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg> НАЧАТЬ</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="header">
                <button class="control-btn" onclick="stopGame()">✕</button>
                <div class="info-center">
                    <div id="timer">00:00</div>
                    <div class="stats-line"><span id="display-n">2</span>-Back • <span id="progress">0/25</span></div>
                </div>
                <button class="control-btn" onclick="togglePause()">II</button>
            </div>

            <div class="game-area">
                <div id="word-card" class="hidden">
                    <div id="word-index" class="hidden">1</div>
                    <div id="word-display">...</div>
                    <div id="card-timer" class="hidden">3</div>
                </div>
                <div id="wait-msg" class="hidden">Запоминаем...</div>
            </div>

            <div class="input-wrapper">
                <div id="input-area" class="hidden">
                    <form id="game-form" autocomplete="off" onsubmit="handleFormSubmit(event)">
                        <input type="text" id="native-input" placeholder="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="go">
                        <button type="button" id="submit-btn" onclick="submitMath()">➔</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <div id="pause-overlay" class="hidden">
        <h2 class="overlay-title">ПАУЗА</h2>
        <button class="main-btn overlay-btn" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
        <button class="main-btn overlay-btn secondary" onclick="stopGame()">В МЕНЮ</button>
    </div>

    <div id="result-screen" class="hidden">
        <div class="menu-content result-content">
            <div class="settings-block result-block">
                <div class="result-emoji">✓</div>
                <h1 class="result-title">Готово!</h1>
                <div class="result-stats">
                    <div class="rstat"><span>Уровень</span><b id="res-level"></b></div>
                    <div class="rstat"><span>Верно</span><b id="final-score"></b></div>
                    <div class="rstat"><span>Точность</span><b id="final-accuracy"></b></div>
                    <div class="rstat"><span>Время</span><b id="final-time"></b></div>
                </div>
            </div>
            <button class="main-btn" onclick="showSetup()">МЕНЮ</button>
        </div>
    </div>

    <script>
        const viewport = window.visualViewport;
        const appContainer = document.getElementById('app-viewport');
        function resizeHandler() {
            if (!viewport) return;
            appContainer.style.height = `${viewport.height}px`;
            const kbOpen = (window.innerHeight - viewport.height) > 100;
            appContainer.classList.toggle('kb-open', kbOpen);
            window.scrollTo(0, 0);
        }
        if (viewport) {
            viewport.addEventListener('resize', resizeHandler);
            viewport.addEventListener('scroll', resizeHandler);
            resizeHandler();

        function parseVocab(text) {

        function generateMathProblem(difficulty) {
            let a, b, op, res;
            const ops = ['+', '-', '*', '/'];
            const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

            while (true) {
                op = ops[Math.floor(Math.random() * ops.length)];
                
                if (difficulty === 'math_table') { 
                    if (op === '+') { a = rand(2, 20); b = rand(2, 20); if(a+b > 30) continue; }
                    else if (op === '-') { a = rand(5, 30); b = rand(2, a); }
                    else if (op === '*') { a = rand(2, 9); b = rand(2, 9); }
                    else if (op === '/') { b = rand(2, 9); res = rand(2, 9); a = b * res; }
                } 
                else if (difficulty === 'math100') { 
                    if (op === '+') { a = rand(10, 80); b = rand(10, 20); }
                    else if (op === '-') { a = rand(20, 100); b = rand(5, a); }
                    else if (op === '*') { a = rand(3, 15); b = rand(2, 6); }
                    else if (op === '/') { b = rand(2, 8); res = rand(5, 12); a = b * res; }
                }
                else if (difficulty === 'math500') { 
                    if (op === '+') { a = rand(50, 400); b = rand(50, 100); }
                    else if (op === '-') { a = rand(150, 500); b = rand(50, a - 50); }
                    else if (op === '*') { a = rand(12, 40); b = rand(3, 9); }
                    else if (op === '/') { b = rand(4, 15); res = rand(15, 30); a = b * res; }
                }

                if (op === '+') res = a + b;
                if (op === '-') res = a - b;
                if (op === '*') res = a * b;
                if (op === '/') res = a / b;

                if (difficulty === 'math_table' && res > 81) continue;
                if (difficulty === 'math100' && res > 100) continue;
                if (difficulty === 'math500' && (op === '/' ? (a < 100 || a > 500) : (res < 100 || res > 500))) continue;

                let visualOp = op;
                if(op === '*') visualOp = '×';
                if(op === '/') visualOp = ':';

                return {
                    question: `${a} ${visualOp} ${b}`,
                    answer: res.toString()
                };
            }
        }

                nativeInput.blur();
            } else {
                pauseOverlay.classList.add('hidden');
                if (needsInput) {
                    nativeInput.focus();
                } else {
                    startMemoTimer();
                }
            }
        }

        function startMemoTimer() {
            clearInterval(cardTimerInterval);
            cardTimerEl.classList.remove('hidden');
            let timeLeft = memoTime;
            cardTimerEl.innerText = timeLeft;
            cardTimerInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft < 1) timeLeft = 0;
                cardTimerEl.innerText = timeLeft;
            }, 1000);
            gameTimer = setTimeout(() => {
                if(!isGameRunning || isPaused) return;
                clearInterval(cardTimerInterval);
                nextTurn();
            }, memoTime * 1000);
        }

        function nextTurn() {
            if (!isGameRunning) return;
            isProcessing = false;

            if (recallIndex >= targetInputs) {
                endGame();
                return;
            }

            nativeInput.value = '';
            nativeInput.className = '';
            nativeInput.classList.remove('input-success', 'input-error', 'input-reveal');
            attempts = 3;
            clearInterval(cardTimerInterval);

            let isGenerating = history.length < targetInputs;
            let displayContent = "";

            if (isGenerating) {
                let item = {};
                let genType = 'word';
                
                if (currentMode.startsWith('math')) {
                    genType = 'math';
                } else if (currentMode === 'super_mix') {
                    genType = Math.random() < 0.5 ? 'math' : 'word';
                }

                if (genType === 'math') {
                    let difficulty = currentMode === 'super_mix' ? 'math_table' : currentMode;
                    item = generateMathProblem(difficulty);
                    item.type = 'math';
                } else {
                    let list = (currentMode === 'super_mix') ? wordsNoun : activeWordList;
                    const w = list[Math.floor(Math.random() * list.length)];
                    item = { question: w, answer: w, type: 'word' };
                }

                history.push(item);
                displayContent = item.question;
                wordDisplay.classList.remove('countdown-big');
            } else {
                let remaining = targetInputs - recallIndex;
                displayContent = remaining;
                wordDisplay.classList.add('countdown-big');
            }

            wordDisplay.innerText = displayContent;
            needsInput = history.length > nLevel;

            if (needsInput) {
                wordCard.classList.remove('hidden');
                inputArea.classList.remove('hidden');
                waitMsg.classList.add('hidden');
                
                wordIndexEl.classList.add('hidden');
                cardTimerEl.classList.add('hidden');
                updateProgress();
                
                const targetIndex = history.length - 1 - nLevel;
                const targetItem = history[targetIndex];
                
                if (targetItem.type === 'math') {
                    nativeInput.setAttribute('type', 'tel');
                    nativeInput.setAttribute('inputmode', 'decimal');
                    submitBtn.style.display = 'flex';
                } else {
                    nativeInput.setAttribute('type', 'text');
                    nativeInput.setAttribute('inputmode', 'text');
                    submitBtn.style.display = 'none';
                }
                
                setTimeout(() => { if(!isPaused) nativeInput.focus(); }, 50);

            } else {
                wordCard.classList.remove('hidden');
                inputArea.classList.add('hidden');
                waitMsg.classList.add('hidden'); 
                nativeInput.blur();
                
                progressDisplay.innerText = `${recallIndex}/${targetInputs}`;
                
                wordIndexEl.innerText = history.length;
                wordIndexEl.classList.remove('hidden');
                
                startMemoTimer();
            }
        }

        function submitMath() {
            handleFormSubmit({ preventDefault: () => {} });
            nativeInput.focus();
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            if (!needsInput || isPaused || isProcessing) return;

            let userText = nativeInput.value.trim().toLowerCase();
            if (!userText) return;

            const targetItem = history[recallIndex];
            
            if (targetItem.type === 'math') {
                userText = userText.replace(',', '.');
            }

            const targetAnswer = targetItem.answer.toLowerCase();

            let isCorrect = false;
            const normUser = userText.replace(/ё/g, 'е');
            const normTarget = targetAnswer.replace(/ё/g, 'е');
            isCorrect = (normUser === normTarget);

            if (isCorrect) {
                isProcessing = true;
                nativeInput.classList.add('input-success');
                finishRound(true);
            } else {
                attempts--;
                nativeInput.classList.add('input-error');
                if (navigator.vibrate) navigator.vibrate(200);

                setTimeout(() => {
                    nativeInput.classList.remove('input-error');
                    if(attempts > 0) nativeInput.value = '';
                }, 500);

                if (attempts <= 0) {
                    isProcessing = true;
                    // ПОКАЗ ПРАВИЛЬНОГО ОТВЕТА (БЕЛЫМ)
                    setTimeout(() => {
                        nativeInput.value = targetAnswer; 
                        nativeInput.classList.add('input-reveal'); 
                        gameTimer = setTimeout(() => {
                            finishRound(false);
                        }, 1500); 
                    }, 500);
                }
            }
        }
        
        function finishRound(success) {
            recallIndex++; 
            if (success) correctCount++;
            updateProgress();
            let delay = success ? 400 : 100; 
            if(!success && attempts <=0) delay = 100; 
            
            if(success) {
                 gameTimer = setTimeout(() => { nextTurn(); }, delay);
            } else if (attempts <= 0) {
                 nextTurn();
            }
        }

        function updateProgress() {
            let displayCount = recallIndex;
            if (needsInput && recallIndex < targetInputs) displayCount = recallIndex + 1;
            progressDisplay.innerText = `${displayCount}/${targetInputs}`;
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(mainTimerInterval);
            clearInterval(cardTimerInterval);
            nativeInput.blur();
            gameScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            document.getElementById('res-level').innerText = nLevel + "-Back";
            document.getElementById('final-score').innerText = correctCount + " / " + targetInputs;
            const acc = targetInputs > 0 ? Math.round(correctCount / targetInputs * 100) : 0;
            document.getElementById('final-accuracy').innerText = acc + "%";
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            document.getElementById('final-time').innerText = `${m}:${s}`;
        }

        // === ТАКТИЛЬНАЯ ОТДАЧА (iOS 18+ switch-хак + Android Vibration API) ===
        const hapticLabel = document.getElementById('haptic-label');
        function haptic() {
            try {
                if (navigator.vibrate) navigator.vibrate(8);
                if (hapticLabel) hapticLabel.click();
            } catch (e) {}
        }

        // === КОЛЁСА НАСТРОЕК (iOS-стиль) ===
        const WH_ITEM = 30, WH_H = 120, WH_PAD = (WH_H - WH_ITEM) / 2, WH_CENTER = WH_H / 2;
        const wheels = {};
        function buildWheelPicker(picker) {
            const key = picker.dataset.key;
            const min = +picker.dataset.min, max = +picker.dataset.max;
            const step = +(picker.dataset.step || 1), def = +picker.dataset.def;
            const list = picker.querySelector('.wlist');
            const values = [];
            for (let v = min; v <= max; v += step) values.push(v);
            values.forEach(v => { const d = document.createElement('div'); d.className = 'witem'; d.textContent = v; list.appendChild(d); });
            const items = [...list.querySelectorAll('.witem')];
            function render() {
                const sc = list.scrollTop + WH_CENTER;
                items.forEach((it, i) => {
                    const c = i * WH_ITEM + WH_ITEM / 2 + WH_PAD;
                    const dist = c - sc;
                    const ang = Math.max(-70, Math.min(70, (dist / WH_ITEM) * 24));
                    it.style.transform = `rotateX(${-ang}deg) translateZ(${-Math.abs(dist) * 0.25}px) scale(${Math.max(0.78, 1 - Math.abs(dist) / 320)})`;
                    it.style.opacity = Math.max(0.12, 1 - Math.abs(dist) / 80);
                    it.style.color = Math.abs(dist) < WH_ITEM / 2 ? '#ffffff' : '#9fa0a8';
                });
            }
            function idx() { return Math.max(0, Math.min(values.length - 1, Math.round(list.scrollTop / WH_ITEM))); }
            let raf = null, lastIdx = -1;
            list.addEventListener('scroll', () => { if (raf) return; raf = requestAnimationFrame(() => { render(); const ci = idx(); if (ci !== lastIdx) { lastIdx = ci; haptic(); } picker.dataset.current = values[ci]; raf = null; }); });
            const startIdx = Math.max(0, values.indexOf(def));
            list.scrollTop = startIdx * WH_ITEM;
            lastIdx = startIdx;
            picker.dataset.current = values[startIdx];
            render();
            wheels[key] = { picker, list, values, render };
        }
        function getWheelValue(key) { return +wheels[key].picker.dataset.current; }
        function setWheelValue(key, v) {
            const w = wheels[key]; if (!w) return;
            let i = w.values.indexOf(v);
            if (i < 0) { i = 0; let best = Infinity; w.values.forEach((val, j) => { const d = Math.abs(val - v); if (d < best) { best = d; i = j; } }); }
            w.list.scrollTop = i * WH_ITEM;
            w.picker.dataset.current = w.values[i];
            w.render();
        }
        document.querySelectorAll('.picker').forEach(buildWheelPicker);
    </script>
</body>
