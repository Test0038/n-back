<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Matematum</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0d11">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0c0d11;
            --card-grad-top: #212228;
            --card-grad-bot: #16171b;
            --card-border: #2e2f37;
            --key-grad-top: #2c2d34;
            --key-grad-bot: #212229;
            --key-border: #353640;
            --text-main: #ffffff;
            --text-muted: #82838c;
            --text-dim: #6c6d76;
            --accent-color: #0a84ff;
            --accent-bright: #3d8bff;
            --accent-icon: #5fa0ff;
            --success-color: #30d158;
            --error-color: #ff453a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed;
            color: var(--text-main); font-family: 'Nunito', -apple-system, sans-serif;
            background: radial-gradient(120% 70% at 50% -8%, #16171c 0%, #0c0d11 45%, #08090c 100%);
        }
        html { background-color: #08090c; }
        #app-viewport {
            display: flex; flex-direction: column; width: 100%; height: 100%;
            padding-top: max(10px, env(safe-area-inset-top));
            padding-left: 18px; padding-right: 18px; padding-bottom: env(safe-area-inset-bottom);
            transition: height 0.1s;
        }

        /* --- МЕНЮ --- */
        #setup-screen {
            flex: 1; width: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 12px 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        #setup-screen::-webkit-scrollbar { display: none; }
        .menu-content { width: 100%; max-width: 410px; margin: 0 auto; flex-shrink: 0; }

        h1 {
            margin: 6px 0 18px 0; color: #fff; font-size: 2.3rem; font-weight: 900;
            text-align: center; letter-spacing: -1.2px;
            text-shadow: 0 1px 0 #3a3b42, 0 2px 1px rgba(0,0,0,.5), 0 6px 30px rgba(10,132,255,.3);
        }

        .settings-block {
            padding: 16px 14px; margin-bottom: 14px; border-radius: 22px;
            background: linear-gradient(180deg, var(--card-grad-top) 0%, var(--card-grad-bot) 100%);
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.07), inset 0 -1px 0 rgba(0,0,0,.4),
                0 2px 4px rgba(0,0,0,.4), 0 22px 42px -22px rgba(0,0,0,.95);
        }
        .block-title {
            text-align: center; font-weight: 800; font-size: .9rem; letter-spacing: 1.6px;
            color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; text-shadow: 0 1px 0 rgba(0,0,0,.5);
        }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mode-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
        .mode-grid + .mode-grid { margin-top: 8px; }

        .mode-btn {
            display: flex; align-items: center; justify-content: center; gap: 7px;
            padding: 13px 5px; border-radius: 14px; font-weight: 700; font-size: .82rem; color: #abacb4;
            cursor: pointer; text-align: center; border: 1px solid var(--key-border);
            font-family: 'Nunito', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            background: linear-gradient(180deg, var(--key-grad-top) 0%, var(--key-grad-bot) 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 3px rgba(0,0,0,.4), 0 6px 12px -7px rgba(0,0,0,.65);
            transition: transform .12s, box-shadow .12s, background .15s, color .15s, border-color .15s;
        }
        .mode-btn svg { width: 16px; height: 16px; flex: 0 0 auto; color: #7e7f88; transition: color .15s; }
        .mode-btn:active { transform: translateY(2px); box-shadow: inset 0 2px 6px rgba(0,0,0,.6); }
        .mode-btn.active {
            color: #fff; border-color: var(--accent-bright);
            background: linear-gradient(180deg, #34353d 0%, #262730 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 0 0 1px rgba(61,139,255,.4),
                0 8px 20px -6px rgba(61,139,255,.6), 0 2px 4px rgba(0,0,0,.45);
        }
        .mode-btn.active svg { color: var(--accent-icon); }
        .super-btn { grid-column: 1 / -1; }

        /* --- КОЛЁСА ПАРАМЕТРОВ (iOS-стиль) --- */
        .params { display: flex; justify-content: center; gap: 10px; margin-bottom: 2px; }
        .param { display: flex; flex-direction: column; align-items: center; width: 140px; }
        .param > label { font-size: .73rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: .3px; }
        .picker {
            position: relative; width: 100%; height: 120px; border-radius: 16px; overflow: hidden;
            background: linear-gradient(180deg, #141519 0%, #1b1c21 100%); border: 1px solid #2a2b32;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.75), inset 0 -2px 6px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.04);
            perspective: 700px;
        }
        .picker .sel {
            position: absolute; left: 7px; right: 7px; top: 45px; height: 30px; z-index: 2; pointer-events: none;
            border-top: 1px solid rgba(95,160,255,.45); border-bottom: 1px solid rgba(95,160,255,.45);
            background: linear-gradient(180deg, rgba(61,139,255,.12), rgba(61,139,255,.05));
            border-radius: 7px; box-shadow: 0 0 14px -2px rgba(61,139,255,.35) inset;
        }
        .wlist {
            height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; padding: 45px 0;
            scrollbar-width: none; -webkit-overflow-scrolling: touch; transform-style: preserve-3d;
            -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 32%, #000 68%, transparent 100%);
                    mask-image: linear-gradient(180deg, transparent 0%, #000 32%, #000 68%, transparent 100%);
        }
        .wlist::-webkit-scrollbar { display: none; }
        .witem {
            height: 30px; line-height: 30px; text-align: center; scroll-snap-align: center;
            font-weight: 800; font-size: 1.2rem; color: #fff; font-variant-numeric: tabular-nums;
            transform-origin: center center; backface-visibility: hidden; will-change: transform, opacity;
        }

        /* --- ГЛАВНАЯ КНОПКА --- */
        button.main-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border: none; border-radius: 18px; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.25rem; color: #fff; letter-spacing: .5px;
            margin-top: 18px;
            background: linear-gradient(180deg, #38a0ff 0%, #0a84ff 55%, #0670e0 100%); border-bottom: 2px solid #0559b5;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 6px 12px -2px rgba(10,132,255,.55), 0 16px 30px -12px rgba(10,132,255,.6);
            transition: transform .1s, box-shadow .1s;
        }
        button.main-btn svg { width: 17px; height: 17px; }
        button.main-btn:active { transform: translateY(2px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 3px 8px -2px rgba(10,132,255,.5), 0 8px 18px -10px rgba(10,132,255,.6); }

        /* --- ИГРА --- */
        #game-screen { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; }

        .header { display: grid; grid-template-columns: 46px 1fr 46px; align-items: center; flex: 0 0 auto; margin: 10px 0; }
        .control-btn {
            width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--key-border); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: var(--text-muted);
            font-family: 'Nunito', sans-serif; font-weight: 800;
            background: linear-gradient(180deg, var(--key-grad-top), var(--key-grad-bot));
            box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 4px rgba(0,0,0,.4), 0 6px 12px -7px rgba(0,0,0,.6);
            transition: transform .1s, box-shadow .1s;
        }
        .control-btn:active { transform: translateY(1px); box-shadow: inset 0 2px 6px rgba(0,0,0,.6); }
        .info-center { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.25; }
        .mode-caption {
            font-size: .66rem; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase;
            color: var(--text-dim); margin-bottom: 3px; text-shadow: 0 1px 0 rgba(0,0,0,.5);
            white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
        }
        #timer { font-size: 1.15rem; font-weight: 900; color: var(--text-dim); font-variant-numeric: tabular-nums; }

        .game-area { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; min-height: 0; }

        /* ОБЪЁМНАЯ КАРТОЧКА ПРИМЕРА */
        #word-card {
            width: 100%; max-width: 410px; height: 60%; max-height: 230px; min-height: 165px;
            border-radius: 26px; position: relative; margin-bottom: 22px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #24252c 0%, #15161a 100%); border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.5),
                0 3px 6px rgba(0,0,0,.45), 0 30px 55px -24px rgba(0,0,0,.95);
        }
        #progress {
            position: absolute; top: 15px; width: 100%; text-align: center;
            font-size: .95rem; font-weight: 800; color: var(--text-muted); opacity: .55;
            line-height: 1; font-variant-numeric: tabular-nums;
        }
        #word-display {
            font-size: 3rem; font-weight: 900; color: #fff; margin: 0;
            text-align: center; line-height: 1.05; padding: 0 12px; white-space: nowrap;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 8px rgba(0,0,0,.5);
        }

        /* --- ВВОД (утопленное поле) --- */
        .input-wrapper { flex: 0 0 auto; width: 100%; max-width: 410px; margin: 0 auto; padding-bottom: 0; }
        #app-viewport.kb-open { padding-bottom: 0; }
        #game-form { width: 100%; display: flex; gap: 8px; }
        #native-input {
            flex: 1; padding: 15px; font-size: 1.5rem; color: #fff; text-align: center;
            border-radius: 16px; border: 1px solid #2a2b32; outline: none; -webkit-appearance: none;
            font-family: 'Nunito', sans-serif; font-weight: 800;
            background: linear-gradient(180deg, #141519 0%, #1b1c21 100%);
            box-shadow: inset 0 3px 9px rgba(0,0,0,.75), inset 0 -1px 0 rgba(255,255,255,.04);
            transition: border-color .15s, box-shadow .15s;
        }
        #native-input:focus {
            border-color: var(--accent-bright);
            box-shadow: inset 0 3px 9px rgba(0,0,0,.7), 0 0 0 1px rgba(61,139,255,.4), 0 6px 18px -6px rgba(61,139,255,.5);
        }
        #submit-btn {
            width: 60px; flex-shrink: 0; border: none; border-radius: 16px; cursor: pointer; color: #fff;
            font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #38a0ff 0%, #0a84ff 55%, #0670e0 100%); border-bottom: 2px solid #0559b5;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 6px 12px -2px rgba(10,132,255,.5);
            transition: transform .1s;
        }
        #submit-btn:active { transform: translateY(2px); }

        .input-error { border-color: var(--error-color) !important; animation: shake 0.4s;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.7), 0 0 0 1px rgba(255,69,58,.5) !important; }
        .input-success { border-color: var(--success-color) !important; color: var(--success-color) !important;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.5), 0 0 0 1px rgba(48,209,88,.55), 0 6px 18px -6px rgba(48,209,88,.5) !important; }
        .input-reveal { border-color: #fff !important; color: #fff !important;
            box-shadow: inset 0 3px 9px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.5) !important; }

        /* --- ПОВОРОТ ЭКРАНА --- */
        #rotate-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            background: rgba(8,9,12,.97); backdrop-filter: blur(8px); text-align: center;
        }
        #rotate-overlay .rot-icon { width: 56px; height: 56px; animation: rotHint 1.6s ease-in-out infinite alternate; }
        #rotate-overlay .rot-title { font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.4; }
        @keyframes rotHint { from { transform: rotate(-90deg); } to { transform: rotate(0deg); } }
        @media (orientation: landscape) { #rotate-overlay { display: flex; } }

        /* --- СТАТИСТИКА --- */
        #setup-screen .menu-content { position: relative; }
        .stats-cbtn {
            width: 46px; height: 46px; border-radius: 50%; border: 1px solid #353640; cursor: pointer;
            color: var(--text-muted); font-family: 'Nunito', sans-serif; font-size: 1.6rem; font-weight: 800; line-height: 1;
            background: linear-gradient(180deg, #2c2d34, #212229);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 4px rgba(0,0,0,.4);
            display: flex; align-items: center; justify-content: center; padding: 0;
        }
        .stats-cbtn svg { width: 20px; height: 20px; }
        .stats-cbtn.back { padding: 0 0 4px; }
        #stats-corner-btn { position: absolute; top: 6px; right: 0; z-index: 5; }
        #stats-screen, #detail-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 70;
            background: var(--bg-color); display: flex; flex-direction: column;
            padding: max(10px, env(safe-area-inset-top)) 18px calc(env(safe-area-inset-bottom) + 12px);
        }
        .stats-head { display: grid; grid-template-columns: 46px 1fr 46px; align-items: center; margin: 8px 0 14px; flex: 0 0 auto; }
        .stats-title { text-align: center; font-size: 1.5rem; font-weight: 900; }
        #stats-list { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #stats-list::-webkit-scrollbar { display: none; }
        #detail-screen .menu-content { width: 100%; max-width: 410px; margin: 0 auto; }
        .hrow {
            display: flex; align-items: center; gap: 10px; padding: 10px 10px 10px 12px; margin-bottom: 8px;
            border-radius: 14px; background: linear-gradient(180deg, #2c2d34, #212229); border: 1px solid var(--key-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.06); cursor: pointer;
        }
        .hrow.agg { cursor: default; }
        .hmain { flex: 1; min-width: 0; pointer-events: none; }
        .hmain b { display: block; font-size: .92rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hmain span { display: block; font-size: .75rem; font-weight: 700; color: var(--text-muted); margin-top: 2px; }
        .hacc { font-size: 1.05rem; font-weight: 900; font-variant-numeric: tabular-nums; flex: 0 0 auto; pointer-events: none; }
        .hdel {
            flex: 0 0 auto; min-width: 34px; height: 34px; padding: 0 8px; border-radius: 10px; border: 1px solid var(--key-border);
            background: linear-gradient(180deg, #2c2d34, #212229); color: var(--text-muted); font-family: 'Nunito', sans-serif;
            font-weight: 800; font-size: .85rem; cursor: pointer;
        }
        .hdel.arm { border-color: var(--error-color); color: #fff; background: linear-gradient(180deg, #d9453a, #b3362d); }
        .hempty { text-align: center; color: var(--text-dim); font-size: .85rem; font-weight: 700; padding: 8px 0 4px; }
        .kb-open .header { margin: 4px 0; }

        .hidden { display: none !important; }

        /* --- ОВЕРЛЕИ --- */
        #pause-overlay, #result-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
            background: rgba(8,9,12,.82); backdrop-filter: blur(8px);
        }
        #result-screen { background: var(--bg-color); z-index: 60; }
        .overlay-title { color: #fff; margin: 0 0 26px; font-size: 2rem; font-weight: 900; letter-spacing: -.5px; }
        .overlay-btn { width: 72%; max-width: 300px; }
        .overlay-btn.secondary {
            background: linear-gradient(180deg, #2c2d34, #212229) !important; border-bottom: 2px solid #16171b !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 6px 12px -7px rgba(0,0,0,.6) !important; margin-top: 12px;
        }
        .result-content { margin: auto; width: 100%; max-width: 410px; }
        #result-screen .result-content { overflow-y: auto; max-height: 100%; -webkit-overflow-scrolling: touch; }
        #result-screen .result-content::-webkit-scrollbar { display: none; }
        .result-block { text-align: center; }
        .result-emoji {
            width: 64px; height: 64px; margin: 4px auto 14px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: #fff;
            background: linear-gradient(180deg, #2fce6e, #1fa857); border-bottom: 2px solid #178044;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 10px 24px -8px rgba(48,209,88,.6);
        }
        .result-title { color: var(--success-color); font-size: 2rem; margin: 0 0 18px; text-shadow: 0 2px 16px rgba(48,209,88,.35); }
        .result-stats { display: flex; flex-direction: column; gap: 10px; }
        .rstat { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px;
            border-radius: 14px; background: linear-gradient(180deg, #2c2d34, #212229); border: 1px solid var(--key-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.06); }
        .rstat span { color: var(--text-muted); font-weight: 700; font-size: 1rem; }
        .rstat b { color: #fff; font-weight: 900; font-size: 1.15rem; font-variant-numeric: tabular-nums; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    </style>
</head>
<body>

    <div id="app-viewport">

        <div id="setup-screen">
            <div class="menu-content">
                <button class="stats-cbtn" id="stats-corner-btn" onclick="showStats()" aria-label="Статистика"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="20" x2="6" y2="12"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="18" y1="20" x2="18" y2="9"/></svg></button>
                <h1>Matematum</h1>

                <div class="settings-block">
                    <div class="block-title">ОПЕРАЦИЯ</div>
                    <div class="mode-grid">
                        <button class="mode-btn op-btn active" onclick="setOp('add', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Сложение</button>
                        <button class="mode-btn op-btn" onclick="setOp('sub', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>Вычитание</button>
                        <button class="mode-btn op-btn" onclick="setOp('mul', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>Умножение</button>
                        <button class="mode-btn op-btn" onclick="setOp('div', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><circle cx="12" cy="6.5" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="17.5" r="1.4" fill="currentColor" stroke="none"/></svg>Деление</button>
                        <button class="mode-btn op-btn super-btn" onclick="setOp('mix', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>Микс</button>
                    </div>
                    <div class="mode-grid">
                        <button class="mode-btn super-btn" id="frac-btn" onclick="toggleFrac(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.4"/><circle cx="17.5" cy="17.5" r="2.4"/></svg>Дроби</button>
                    </div>
                </div>

                <div class="settings-block">
                    <div class="block-title">ДИАПАЗОН</div>
                    <div class="mode-grid cols3">
                        <button class="mode-btn range-btn active" onclick="setRange(0, this)">1 - 100</button>
                        <button class="mode-btn range-btn" onclick="setRange(1, this)">100 - 500</button>
                        <button class="mode-btn range-btn" onclick="setRange(2, this)">500 - 1k</button>
                    </div>
                    <div class="mode-grid">
                        <button class="mode-btn range-btn" onclick="setRange(3, this)">1k - 5k</button>
                        <button class="mode-btn range-btn" onclick="setRange(4, this)">5k - 10k</button>
                    </div>
                </div>

                <div class="params">
                    <div class="param">
                        <label>Примеров в игре</label>
                        <div class="picker" data-key="cnt" data-min="5" data-max="100" data-step="1" data-def="20"><div class="sel"></div><div class="wlist"></div></div>
                    </div>

                        <label>Время (мин)</label>
                        <div class="picker" data-key="tmin" data-min="0" data-max="60" data-step="1" data-def="0"><div class="sel"></div><div class="wlist"></div></div>
                    </div>
                </div>

                <button class="main-btn" onclick="startGame()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg> НАЧАТЬ</button>
            </div>

        <div id="game-screen" class="hidden">
            <div class="header">
                <button class="control-btn" onclick="stopGame()">✕</button>

                    <form id="game-form" autocomplete="off" onsubmit="handleFormSubmit(event)">
                        <input type="tel" id="native-input" inputmode="decimal" placeholder="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="go">

    <div id="rotate-overlay">
        <svg class="rot-icon" viewBox="0 0 24 24" fill="none" stroke="#5fa0ff" stroke-width="1.6" stroke-linecap="round"><rect x="7" y="3" width="10" height="18" rx="2.5"/><path d="M10.8 18.5h2.4"/></svg>

    <div id="result-screen" class="hidden">
        <div class="menu-content result-content">

                <div class="result-emoji">✓</div>

                    <div class="rstat"><span>Режим</span><b id="res-mode"></b></div>
                    <div class="rstat"><span>Диапазон</span><b id="res-range"></b></div>

    <div id="stats-screen" class="hidden">

            <div></div>
        </div>
        <div class="menu-content">
            <div class="settings-block">
                <div class="result-stats">
                    <div class="rstat"><span>Режим</span><b id="det-mode"></b></div>
                    <div class="rstat"><span>Диапазон</span><b id="det-range"></b></div>
                    <div class="rstat"><span>Решено</span><b id="det-score"></b></div>
                    <div class="rstat"><span>Точность (с 1-й)</span><b id="det-acc"></b></div>
                    <div class="rstat"><span>Ошибочных попыток</span><b id="det-wrong"></b></div>
                    <div class="rstat"><span>Провалено</span><b id="det-fail"></b></div>
                    <div class="rstat"><span>Среднее время ответа</span><b id="det-avg"></b></div>
                    <div class="rstat"><span>Время</span><b id="det-time"></b></div>

    <script>
        const viewport = window.visualViewport;
        const appContainer = document.getElementById('app-viewport');
        function resizeHandler() {
            if (!viewport) return;
            appContainer.style.height = `${viewport.height}px`;
            const kbOpen = (window.innerHeight - viewport.height) > 100;
            appContainer.classList.toggle('kb-open', kbOpen);
            window.scrollTo(0, 0);
        }
        if (viewport) {
            viewport.addEventListener('resize', resizeHandler);
            viewport.addEventListener('scroll', resizeHandler);
            resizeHandler();
        }

        // --- РЕЖИМЫ И ДИАПАЗОНЫ ---
        const OPS = {
            add: { name: 'Сложение', sym: '+' },
            sub: { name: 'Вычитание', sym: '−' },
            mul: { name: 'Умножение', sym: '×' },
            div: { name: 'Деление', sym: ':' },
            mix: { name: 'Микс', sym: '∗' }
        };
        const RANGES = [[1, 100], [100, 500], [500, 1000], [1000, 5000], [5000, 10000]];
        const RANGE_NAMES = ['1 - 100', '100 - 500', '500 - 1k', '1k - 5k', '5k - 10k'];

        /* GEN:BEGIN */
        // Генератор примеров. Все числа хранятся в десятых долях (×10) — без плавающей точки.
        // Правило: «крупное» число примера лежит в выбранном диапазоне [lo, hi],
        // все числа примера не превышают hi:
        //   сложение  — сумма в диапазоне, слагаемые 20–80% от неё;
        //   вычитание — уменьшаемое в диапазоне, вычитаемое 20–80% от него;
        //   умножение — произведение в диапазоне;
        //   деление   — делимое в диапазоне; без дробей — нацело.
        // Режим «Дроби»: точность 0,1; сложение/вычитание — хотя бы один операнд дробный;
        // умножение — дробь × целое; деление — целый делитель, дробный ответ.
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        function fmt(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u202F'); }
        function fmtDec(x10) {
            const i = Math.floor(x10 / 10), f = x10 % 10;
            return fmt(i) + (f ? ',' + f : '');
        }
        function mk(a10, sym, b10, ans10) {
            return { q: fmtDec(a10) + ' ' + sym + ' ' + fmtDec(b10), a10: a10, b10: b10, sym: sym, ans10: ans10, ansText: fmtDec(ans10) };
        }

        function genProblem(opKey, lo, hi, frac) {
            const op = (opKey === 'mix') ? ['add', 'sub', 'mul', 'div'][rand(0, 3)] : opKey;
            for (let t = 0; t < 400; t++) {
                if (op === 'add') {
                    if (frac) {
                        const c10 = rand(Math.max(lo, 5) * 10, hi * 10);
                        const aMin = Math.max(1, Math.round(c10 * 0.2));
                        const aMax = Math.max(aMin, Math.round(c10 * 0.8));
                        const a10 = rand(aMin, aMax), b10 = c10 - a10;
                        if (b10 < 1) continue;
                        if (a10 % 10 === 0 && b10 % 10 === 0) continue;
                        return mk(a10, '+', b10, c10);
                    }
                    const c = rand(Math.max(lo, 5), hi);
                    const aMin = Math.max(1, Math.round(c * 0.2));
                    const aMax = Math.max(aMin, Math.round(c * 0.8));
                    const a = rand(aMin, aMax), b = c - a;
                    if (b < 1) continue;
                    return mk(a * 10, '+', b * 10, c * 10);
                }
                if (op === 'sub') {
                    if (frac) {
                        const a10 = rand(Math.max(lo, 5) * 10, hi * 10);
                        const bMin = Math.max(1, Math.round(a10 * 0.2));
                        const bMax = Math.max(bMin, Math.min(a10 - 1, Math.round(a10 * 0.8)));
                        const b10 = rand(bMin, bMax);
                        if (a10 - b10 < 1) continue;
                        if (a10 % 10 === 0 && b10 % 10 === 0) continue;
                        return mk(a10, '−', b10, a10 - b10);
                    }
                    const a = rand(Math.max(lo, 5), hi);
                    const bMin = Math.max(1, Math.round(a * 0.2));
                    const bMax = Math.max(bMin, Math.min(a - 1, Math.round(a * 0.8)));
                    const b = rand(bMin, bMax);
                    if (a - b < 1) continue;
                    return mk(a * 10, '−', b * 10, (a - b) * 10);
                }
                if (op === 'mul') {
                    if (frac) {
                        const f10 = rand(11, Math.max(15, Math.floor(Math.sqrt(hi)) * 10));
                        if (f10 % 10 === 0) continue;
                        const nMin = Math.max(2, Math.ceil(lo * 10 / f10));
                        const nMax = Math.floor(hi * 10 / f10);
                        if (nMax < nMin) continue;
                        const n = rand(nMin, nMax);
                        const p10 = f10 * n;
                        return Math.random() < 0.5 ? mk(f10, '×', n * 10, p10) : mk(n * 10, '×', f10, p10);
                    }
                    const f = rand(2, Math.max(3, Math.floor(Math.sqrt(hi))));
                    const bMin = Math.max(2, Math.ceil(lo / f));
                    const bMax = Math.floor(hi / f);
                    if (bMax < bMin) continue;
                    const b = rand(bMin, bMax);
                    return Math.random() < 0.5 ? mk(f * 10, '×', b * 10, f * b * 10) : mk(b * 10, '×', f * 10, f * b * 10);
                }
                // div
                if (frac) {
                    const d = rand(2, Math.max(3, Math.floor(Math.sqrt(hi))));
                    const qMin = Math.max(11, Math.ceil(lo * 10 / d));
                    const qMax = Math.floor(hi * 10 / d);
                    if (qMax < qMin) continue;
                    const q10 = rand(qMin, qMax);
                    if (q10 % 10 === 0) continue;
                    return mk(d * q10, ':', d * 10, q10);
                }
                const d = rand(2, Math.max(3, Math.floor(Math.sqrt(hi))));
                const qMin = Math.max(2, Math.ceil(lo / d));
                const qMax = Math.floor(hi / d);
                if (qMax < qMin) continue;
                const q = rand(qMin, qMax);
                return mk(d * q * 10, ':', d * 10, q * 10);
            }
            return mk(20, '+', 20, 40);
        }
        /* GEN:END */

        // --- СОСТОЯНИЕ ---
        let currentOp = 'add';
        let currentRange = 0;

        let totalProblems = 20;
        let gameSeconds = 0; // 0 = без лимита времени; иначе игра до первого предела (время или количество)
        const attemptsMax = 3;

        let problemIndex = 0;
        let attempts = 3;
        let correctCount = 0;
        let curProblem = null;
        let sessionStats = null;
        let roundStartMs = 0;
        let roundPausedMs = 0;
        let pauseStartedAt = 0;
        let isGameRunning = false;
        let isPaused = false;
        let isProcessing = false;

        let gameTimer = null;
        let pendingFn = null;
        let pendingRemaining = 0;
        let pendingStart = 0;
        let totalSeconds = 0;
        let mainTimerInterval = null;

        // Планировщик игровых переходов: пауза замораживает и возобновляет отложенные действия
        function schedule(fn, delay) {
            clearTimeout(gameTimer);
            pendingFn = fn;
            pendingRemaining = delay;
            pendingStart = Date.now();
            gameTimer = setTimeout(() => { pendingFn = null; fn(); }, delay);
        }
        function pauseSchedule() {
            if (pendingFn) pendingRemaining = Math.max(0, pendingRemaining - (Date.now() - pendingStart));
            clearTimeout(gameTimer);
        }
        function resumeSchedule() {
            if (pendingFn) schedule(pendingFn, pendingRemaining);
        }
        function cancelSchedule() {
            clearTimeout(gameTimer);
            pendingFn = null;
        }

        // DOM
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const wordCard = document.getElementById('word-card');
        const wordDisplay = document.getElementById('word-display');
        const nativeInput = document.getElementById('native-input');
        const pauseOverlay = document.getElementById('pause-overlay');
        const timerDisplay = document.getElementById('timer');
        const progressDisplay = document.getElementById('progress');
        const displayModeEl = document.getElementById('display-mode');

        // --- ВЫБОР РЕЖИМА И ДИАПАЗОНА ---
        let fracMode = false;
        function setOp(op, btn) {
            currentOp = op;
            document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function setRange(idx, btn) {
            currentRange = idx;
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function toggleFrac(btn) {
            fracMode = !fracMode;
            btn.classList.toggle('active', fracMode);
        }

        // --- ИГРА ---
        function showSetup() {
            cancelSchedule();
            clearInterval(mainTimerInterval);
            nativeInput.blur();
            setupScreen.classList.remove('hidden');
            gameScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            pauseOverlay.classList.add('hidden');
            statsScreen.classList.add('hidden');
            detailScreen.classList.add('hidden');
        }

        function startGame() {
            cancelSchedule();
            totalProblems = getWheelValue('cnt');
            gameSeconds = getWheelValue('tmin') * 60;

            problemIndex = 0;
            correctCount = 0;
            isGameRunning = true;
            isPaused = false;
            isProcessing = false;
            sessionStats = { first: 0, fail: 0, wrong: 0, msSum: 0, msCount: 0 };

            totalSeconds = 0;
            updateMainTimer();
            displayModeEl.innerText = OPS[currentOp].name + ' · ' + RANGE_NAMES[currentRange] + (fracMode ? ' · дроби' : '');

            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            pauseOverlay.classList.add('hidden');

            clearInterval(mainTimerInterval);
            mainTimerInterval = setInterval(() => {
                if (!isPaused && isGameRunning) {
                    totalSeconds++;
                    updateMainTimer();
                    if (gameSeconds > 0 && totalSeconds >= gameSeconds) endGame();
                }
            }, 1000);

            nextProblem();
        }

        function updateMainTimer() {
            const t = gameSeconds > 0 ? Math.max(0, gameSeconds - totalSeconds) : totalSeconds;
            const m = Math.floor(t / 60).toString().padStart(2, '0');
            const s = (t % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }

        function stopGame() {
            isGameRunning = false;
            showSetup();
        }

        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseSchedule();
                pauseOverlay.classList.remove('hidden');
                nativeInput.blur();
                pauseStartedAt = Date.now();
            } else {
                pauseOverlay.classList.add('hidden');
                resumeSchedule();
                if (!isProcessing && roundStartMs) roundPausedMs += Date.now() - pauseStartedAt;
                if (!isProcessing) nativeInput.focus();
            }
        }

        function nextProblem() {
            if (!isGameRunning) return;
            isProcessing = false;

            if (problemIndex >= totalProblems) {
                endGame();
                return;
            }

            const [lo, hi] = RANGES[currentRange];
            curProblem = genProblem(currentOp, lo, hi, fracMode);
            attempts = attemptsMax;

            nativeInput.value = '';
            nativeInput.className = '';
            wordDisplay.innerText = curProblem.q + ' = _';
            fitProblem();
            progressDisplay.innerText = `${problemIndex + 1}/${totalProblems}`;

            cancelSchedule();

            roundStartMs = Date.now();
            roundPausedMs = 0;
            setTimeout(() => { if (isGameRunning && !isPaused) nativeInput.focus(); }, 50);
        }

        function fitProblem() {
            let size = 48; // базовый размер цифр (3rem)
            wordDisplay.style.fontSize = size + 'px';
            const maxW = wordCard.clientWidth - 4;
            while (size > 22 && wordDisplay.scrollWidth > maxW) {
                size -= 2;
                wordDisplay.style.fontSize = size + 'px';
            }
        }

        function roundElapsed() {
            return Date.now() - roundStartMs - roundPausedMs;
        }

        function submitAnswer() {
            handleFormSubmit({ preventDefault: () => {} });
            nativeInput.focus();
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            if (!isGameRunning || isPaused || isProcessing) return;

            const raw = nativeInput.value.trim().replace(',', '.').replace(/[^\d.]/g, '');
            if (!raw || raw === '.') return;
            const val = parseFloat(raw);
            if (!isFinite(val)) return;

            const isCorrect = Math.round(val * 10) === curProblem.ans10;

            if (isCorrect) {
                isProcessing = true;
                nativeInput.classList.add('input-success');
                if (attempts === attemptsMax) sessionStats.first++;
                sessionStats.msSum += roundElapsed();
                sessionStats.msCount++;
                finishRound(true);
            } else {
                attempts--;
                sessionStats.wrong++;
                nativeInput.classList.add('input-error');

                setTimeout(() => {
                    if (!isGameRunning) return;
                    nativeInput.classList.remove('input-error');
                    if (attempts > 0) nativeInput.value = '';
                }, 500);

                if (attempts <= 0) {
                    isProcessing = true;
                    sessionStats.fail++;
                    sessionStats.msSum += roundElapsed();
                    sessionStats.msCount++;
                    // ПОКАЗ ПРАВИЛЬНОГО ОТВЕТА (БЕЛЫМ)
                    schedule(() => {
                        revealAnswer();
                        schedule(() => finishRound(false), 1500);
                    }, 500);
                }
            }
        }

        function revealAnswer() {
            nativeInput.value = curProblem.ansText;
            nativeInput.classList.remove('input-error');
            nativeInput.classList.add('input-reveal');
        }

        function finishRound(success) {
            problemIndex++;
            if (success) correctCount++;
            if (success) {
                schedule(nextProblem, 600);
            } else {
                nextProblem();
            }
        }

        function endGame() {
            isGameRunning = false;
            cancelSchedule();
            clearInterval(mainTimerInterval);
            nativeInput.blur();
            gameScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            const ss = sessionStats;
            const answered = problemIndex;
            const avgMs = Math.round(ss.msSum / Math.max(1, ss.msCount));
            const acc = answered > 0 ? Math.round(ss.first / answered * 100) : 0;

            document.getElementById('res-mode').innerText = OPS[currentOp].name + (fracMode ? ' · дроби' : '');
            document.getElementById('res-range').innerText = RANGE_NAMES[currentRange];
            document.getElementById('final-score').innerText = correctCount + " / " + answered;
            document.getElementById('final-accuracy').innerText = acc + "%";
            document.getElementById('res-wrong').innerText = ss.wrong;
            document.getElementById('res-fail').innerText = ss.fail;
            document.getElementById('res-avg').innerText = (avgMs / 1000).toFixed(1) + " с";
            document.getElementById('final-time').innerText = fmtDur(totalSeconds);

            recordSession({
                d: Date.now(), op: currentOp, rg: currentRange, fr: fracMode ? 1 : 0, rounds: answered,
                first: ss.first, fail: ss.fail, wrong: ss.wrong,
                avgMs: avgMs, dur: totalSeconds
            });
        }

        // === СТАТИСТИКА ===
        const STATS_KEY = 'math_trainer_stats_v1';
        const STATS_CAP = 2000;
        const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        const statsScreen = document.getElementById('stats-screen');
        const detailScreen = document.getElementById('detail-screen');

        function sessTitle(op, rg, fr) {
            return (OPS[op] ? OPS[op].name : op) + ' · ' + (RANGE_NAMES[rg] || rg) + (fr ? ' · дроби' : '');
        }
        function loadStats() {
            try {
                const o = JSON.parse(localStorage.getItem(STATS_KEY));
                if (o && Array.isArray(o.sessions) && o.agg && typeof o.agg === 'object') return o;
            } catch (e) {}
            return { sessions: [], agg: {} };
        }
        function saveStats(st) {
            try { localStorage.setItem(STATS_KEY, JSON.stringify(st)); } catch (e) {}
        }
        function foldIntoAgg(st, sess) {
            const dt = new Date(sess.d);
            const key = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '|' + sess.op + '|' + sess.rg + '|' + (sess.fr ? 1 : 0);
            const a = st.agg[key] || (st.agg[key] = { s: 0, r: 0, first: 0, wrong: 0, msSum: 0, dur: 0 });
            a.s++; a.r += sess.rounds; a.first += sess.first; a.wrong += sess.wrong;
            a.msSum += sess.avgMs; a.dur += sess.dur;
        }
        function recordSession(rec) {
            const st = loadStats();
            st.sessions.push(rec);
            while (st.sessions.length > STATS_CAP) foldIntoAgg(st, st.sessions.shift());
            saveStats(st);
        }
        function fmtDate(ts) {
            const d = new Date(ts);
            const p = n => String(n).padStart(2, '0');
            return p(d.getDate()) + '.' + p(d.getMonth() + 1) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
        }
        function fmtDur(sec) {
            return String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0');
        }
        function showStats() {
            renderStats();
            setupScreen.classList.add('hidden');
            statsScreen.classList.remove('hidden');
        }
        function hideStats() {
            disarmDelete();
            statsScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
        }
        function openDetail(ts) {
            const st = loadStats();
            const x = st.sessions.find(sess => sess.d === ts);
            if (!x) return;
            document.getElementById('detail-title').innerText = fmtDate(x.d);
            document.getElementById('det-mode').innerText = (OPS[x.op] ? OPS[x.op].name : x.op) + (x.fr ? ' · дроби' : '');
            document.getElementById('det-range').innerText = RANGE_NAMES[x.rg] || x.rg;
            document.getElementById('det-score').innerText = (x.rounds - x.fail) + ' / ' + x.rounds;
            document.getElementById('det-acc').innerText = (x.rounds ? Math.round(x.first / x.rounds * 100) : 0) + '%';
            document.getElementById('det-wrong').innerText = x.wrong;
            document.getElementById('det-fail').innerText = x.fail;
            document.getElementById('det-avg').innerText = (x.avgMs / 1000).toFixed(1) + ' с';
            document.getElementById('det-time').innerText = fmtDur(x.dur);
            disarmDelete();
            statsScreen.classList.add('hidden');
            detailScreen.classList.remove('hidden');
        }
        function hideDetail() {
            detailScreen.classList.add('hidden');
            statsScreen.classList.remove('hidden');
        }

        let armedBtn = null, armedTimer = null;
        function disarmDelete() {
            if (!armedBtn) return;
            clearTimeout(armedTimer);
            armedBtn.classList.remove('arm');
            armedBtn.textContent = armedBtn.dataset.label || '✕';
            armedBtn = null;
        }
        function armOrFire(btn, fn) {
            if (armedBtn === btn) { disarmDelete(); fn(); return; }
            disarmDelete();
            armedBtn = btn;
            btn.classList.add('arm');
            btn.textContent = btn.dataset.confirm || 'Удалить?';
            armedTimer = setTimeout(disarmDelete, 2500);
        }
        function deleteSession(ts) {
            const st = loadStats();
            const i = st.sessions.findIndex(sess => sess.d === ts);
            if (i >= 0) { st.sessions.splice(i, 1); saveStats(st); }
            renderStats();
        }
        function deleteAgg(key) {
            const st = loadStats();
            delete st.agg[key];
            saveStats(st);
            renderStats();
        }

        function renderStats() {
            disarmDelete();
            const st = loadStats();
            const det = st.sessions;
            const aggEntries = Object.entries(st.agg).sort((x, y) => y[0].localeCompare(x[0]));
            const listEl = document.getElementById('stats-list');
            if (!det.length && !aggEntries.length) {
                listEl.innerHTML = '<div class="hempty">Сыграй партию — она появится здесь</div>';
                return;
            }
            let html = det.slice().reverse().map(x => {
                const a = x.rounds ? Math.round(x.first / x.rounds * 100) : 0;
                return '<div class="hrow" data-ts="' + x.d + '">' +
                    '<div class="hmain"><b>' + sessTitle(x.op, x.rg, x.fr) + '</b>' +
                    '<span>' + fmtDate(x.d) + ' · ' + x.rounds + ' примеров · ' + (x.avgMs / 1000).toFixed(1) + ' с/пример</span></div>' +
                    '<div class="hacc">' + a + '%</div>' +
                    '<button class="hdel" data-label="✕">✕</button></div>';
            }).join('');
            html += aggEntries.map(([key, a]) => {
                const parts = key.split('|');
                const ym = parts[0], op = parts[1], rg = +parts[2], fr = +parts[3] || 0;
                const yy = ym.split('-')[0], mm = ym.split('-')[1];
                const acc2 = a.r ? Math.round(a.first / a.r * 100) : 0;
                return '<div class="hrow agg" data-agg="' + key + '">' +
                    '<div class="hmain"><b>' + MONTHS_RU[+mm - 1] + ' ' + yy + ' · ' + sessTitle(op, rg, fr) + '</b>' +
                    '<span>Архив · ' + a.s + ' сессий · ' + (a.msSum / a.s / 1000).toFixed(1) + ' с/пример</span></div>' +
                    '<div class="hacc">' + acc2 + '%</div>' +
                    '<button class="hdel" data-label="✕">✕</button></div>';
            }).join('');
            listEl.innerHTML = html;
        }

        document.getElementById('stats-list').addEventListener('click', e => {
            const btn = e.target.closest('.hdel');
            const row = e.target.closest('.hrow');
            if (!row) return;
            if (btn) {
                if (row.dataset.ts) armOrFire(btn, () => deleteSession(+row.dataset.ts));
                else if (row.dataset.agg) armOrFire(btn, () => deleteAgg(row.dataset.agg));
                return;
            }
            if (row.dataset.ts) openDetail(+row.dataset.ts);
        });

        // === КОЛЁСА НАСТРОЕК (iOS-стиль) ===
        const WH_ITEM = 30, WH_H = 120, WH_PAD = (WH_H - WH_ITEM) / 2, WH_CENTER = WH_H / 2;
        const wheels = {};
        function buildWheelPicker(picker) {
            const key = picker.dataset.key;
            const list = picker.querySelector('.wlist');
            const min = +picker.dataset.min, max = +picker.dataset.max;
            const step = +(picker.dataset.step || 1), def = +picker.dataset.def;
            const values = [];
            for (let v = min; v <= max; v += step) values.push(v);
            values.forEach(v => { const d = document.createElement('div'); d.className = 'witem'; d.textContent = v === 0 ? '∞' : v; list.appendChild(d); });
            const items = [...list.querySelectorAll('.witem')];
            function render() {
                const sc = list.scrollTop + WH_CENTER;
                items.forEach((it, i) => {
                    const c = i * WH_ITEM + WH_ITEM / 2 + WH_PAD;
                    const dist = c - sc;
                    const ang = Math.max(-70, Math.min(70, (dist / WH_ITEM) * 24));
                    it.style.transform = `rotateX(${-ang}deg) translateZ(${-Math.abs(dist) * 0.25}px) scale(${Math.max(0.78, 1 - Math.abs(dist) / 320)})`;
                    it.style.opacity = Math.max(0.12, 1 - Math.abs(dist) / 80);
                    it.style.color = Math.abs(dist) < WH_ITEM / 2 ? '#ffffff' : '#9fa0a8';
                });
            }
            function idx() { return Math.max(0, Math.min(values.length - 1, Math.round(list.scrollTop / WH_ITEM))); }
            let raf = null;
            list.addEventListener('scroll', () => { if (raf) return; raf = requestAnimationFrame(() => { render(); picker.dataset.current = values[idx()]; raf = null; }); });
            const startIdx = Math.max(0, values.indexOf(def));
            list.scrollTop = startIdx * WH_ITEM;
            picker.dataset.current = values[startIdx];
            render();
            wheels[key] = { picker, list, values, render };
        }
        function getWheelValue(key) { return +wheels[key].picker.dataset.current; }
        function setWheelValue(key, v) {
            const w = wheels[key]; if (!w) return;
            let i = w.values.indexOf(v);
            if (i < 0) { i = 0; let best = Infinity; w.values.forEach((val, j) => { const d = Math.abs(val - v); if (d < best) { best = d; i = j; } }); }
            w.list.scrollTop = i * WH_ITEM;
            w.picker.dataset.current = w.values[i];
            w.render();
        }
        document.querySelectorAll('.picker').forEach(buildWheelPicker);

        // Автопауза при повороте в альбомную ориентацию
        const landscapeMq = window.matchMedia('(orientation: landscape)');
        landscapeMq.addEventListener('change', () => {
            if (landscapeMq.matches && isGameRunning && !isPaused) togglePause();
        });
    </script>
</body>
</html>
